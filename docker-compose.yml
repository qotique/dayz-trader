x-airflow-env: &airflow-env
  AIRFLOW__CORE__EXECUTOR: LocalExecutor
  AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
  AIRFLOW__CORE__FERNET_KEY: '17HtWPlVI_oxIjagMLtQtmVvt1j-uoGecKCN65r_yuM='
  AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
  AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: 'false'
  AIRFLOW__CORE__AUTH_MANAGER: airflow.api_fastapi.auth.managers.simple.simple_auth_manager.SimpleAuthManager
  AIRFLOW__CORE__SIMPLE_AUTH_MANAGER_ALL_ADMINS: 'true'
  AIRFLOW__API__BASE_URL: http://airflow-api-server:8081
  AIRFLOW__API_AUTH__JWT_SECRET: dev-jwt-secret-key-shared
  PYTHONPATH: /opt/airflow:/opt/airflow/dags

x-airflow-volumes: &airflow-volumes
  - ./output:/opt/airflow/output
  - ./credentials.json:/opt/airflow/credentials.json:z
  - ./config.toml:/opt/airflow/config.toml:z

services:
  trader:
    build: .
    ports:
      - "8080:8080"
    env_file: .env
    volumes:
      - ./output:/app/output:z
      - ./config.toml:/app/config.toml:z
      - ./credentials.json:/app/credentials.json:z

  airflow-init:
    build:
      context: .
      dockerfile: Dockerfile.airflow
    entrypoint: /bin/bash
    command: -c "airflow db migrate"
    environment: *airflow-env
    volumes: *airflow-volumes
    depends_on:
      postgres:
        condition: service_healthy

  airflow-api-server:
    build:
      context: .
      dockerfile: Dockerfile.airflow
    command: airflow api-server --port 8081
    ports:
      - "8081:8081"
    environment: *airflow-env
    volumes: *airflow-volumes
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/api/v2/monitor/health"]
      interval: 30s
      timeout: 10s
      retries: 5

  airflow-scheduler:
    build:
      context: .
      dockerfile: Dockerfile.airflow
    command: airflow scheduler
    environment: *airflow-env
    volumes: *airflow-volumes
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  airflow-dag-processor:
    build:
      context: .
      dockerfile: Dockerfile.airflow
    command: airflow dag-processor
    environment: *airflow-env
    volumes: *airflow-volumes
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U airflow"]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - "5433:5432"

volumes:
  postgres-data:

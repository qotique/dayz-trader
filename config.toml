# Конфигурация генератора TraderX
# --------------------------------
# Этот файл можно редактировать в любом текстовом редакторе (Блокнот).
# Уберите # в начале строки, чтобы раскомментировать значение.

# Режим работы: "google" (из Google Sheets) или "local" (из папки с CSV/Excel)
mode = "google"

# ── Google Sheets ─────────────────────────────────────────────────────────────
[google]
# ID таблицы (берётся из ссылки: https://docs.google.com/spreadsheets/d/<ID>/)
spreadsheet_id = "10EIAQROX6kft6fnHaXk6_rMYb8j9oMgANAxi3yC9w0o"

# Путь к файлу сервисного аккаунта Google (credentials.json)
credentials_file = "credentials.json"

# ── Локальный режим ───────────────────────────────────────────────────────────
# Путь к папке с CSV-файлами или Excel-файлу.
# Каждый лист таблицы — отдельный CSV-файл в папке.
# Имена файлов должны соответствовать названиям листов:
#   Базовые настройки.csv
#   Настройки состояния.csv
#   Лицензии.csv
#   Торговцы.csv
#   Одежда торговцев.csv
#   Категории.csv
#   Товары.csv
#   Цены.csv
#   Валюта.csv
#   Наличка.csv
# input_dir = "input_data"

# ── Выходные данные ───────────────────────────────────────────────────────────
# Куда сохранять результат
output_dir = "output/profiles/TraderX"

